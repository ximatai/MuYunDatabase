name: Java CI with Gradle

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  fast-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Fast test
        run: ./gradlew test -Pmuyun.test.excludeTags=db,quarkus-it -x :muyun-database-quarkus-integration-test:test

  db-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect DB-sensitive changes
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '^(build\.gradle\.kts|settings\.gradle\.kts|gradle\.properties|gradle/|\.github/workflows/gradle\.yml|muyun-database-core/|muyun-database-jdbi/|muyun-database-spring-boot-starter/|muyun-database-test/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Gradle Wrapper
        if: steps.changes.outputs.run == 'true'
        uses: gradle/actions/wrapper-validation@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Set up JDK 21
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        if: steps.changes.outputs.run == 'true'
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: DB regression test
        if: steps.changes.outputs.run == 'true'
        run: ./gradlew :muyun-database-test:test :muyun-database-spring-boot-starter:test -Pmuyun.test.includeTags=db

      - name: Skip DB regression test
        if: steps.changes.outputs.run != 'true'
        run: echo "No DB-sensitive changes detected; skipping DB regression tests."

  quarkus-it:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Quarkus-sensitive changes
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '^(build\.gradle\.kts|settings\.gradle\.kts|gradle\.properties|gradle/|\.github/workflows/gradle\.yml|muyun-database-core/|muyun-database-jdbi/|muyun-database-quarkus/|muyun-database-quarkus-deployment/|muyun-database-quarkus-integration-test/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Gradle Wrapper
        if: steps.changes.outputs.run == 'true'
        uses: gradle/actions/wrapper-validation@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Set up JDK 21
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        if: steps.changes.outputs.run == 'true'
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Quarkus integration test
        if: steps.changes.outputs.run == 'true'
        run: ./gradlew :muyun-database-quarkus-integration-test:test -Pmuyun.test.includeTags=quarkus-it

      - name: Skip Quarkus integration test
        if: steps.changes.outputs.run != 'true'
        run: echo "No Quarkus-sensitive changes detected; skipping Quarkus integration tests."

  dependency-submission:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
